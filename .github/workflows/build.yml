name: Static Code Analysis

on:
  push:
    branches:
      - main

jobs:
  static-analysis:
    name: Run Maven Build & SonarQube
    runs-on: windows-latest

    steps:
      # Step 1: Checkout the repo
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Step 3: Build project with Maven
      - name: Build with Maven
        working-directory: task01    # <-- points to folder containing pom.xml
        run: mvn clean compile

      # Step 4: Run SonarQube analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: task01     # <-- same folder as pom.xml
          # token: ${{ secrets.SONAR_TOKEN }}  # <-- set this in your repo secrets
