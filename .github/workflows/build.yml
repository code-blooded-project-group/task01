name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Analyze
    runs-on: windows-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Set up Java (JDK 17)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Step 3: Build project with Maven
      # Change 'task01' below only if your pom.xml is inside a subfolder
      - name: Build with Maven
        working-directory: task01   # Remove or update this if pom.xml is in root
        run: mvn clean compile

      # Step 4 (Optional): SonarQube scan
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: task01     # Same folder as pom.xml
          # token: ${{ secrets.SONAR_TOKEN }}   # Uncomment if you have a token
