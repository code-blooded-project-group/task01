name: Build

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Analyze
    runs-on: windows-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Needed for full history

      # Step 2: Set up Java
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      # Step 3: Build project with Maven
      - name: Build with Maven
        working-directory: ./task01  # <-- Ensure this points to the folder with pom.xml
        run: mvn clean compile

      # Optional: Run SonarQube analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ./task01  # <-- Same folder as pom.xml
          # token: ${{ secrets.SONAR_TOKEN }}  # uncomment and set in repo secrets

